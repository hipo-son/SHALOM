# VASP INCAR presets by calculation type and accuracy level
# Keys: "calc_type:accuracy" (converted to tuple keys in code)
# Reference: VASP wiki, VASPKIT recipe system

# ---------- STANDARD presets ----------

relaxation:standard:
  ENCUT: 520
  EDIFF: 1.0e-5
  EDIFFG: -0.02
  ISMEAR: 0
  SIGMA: 0.05
  NSW: 99
  IBRION: 2
  ISIF: 3
  PREC: "Accurate"
  LREAL: "Auto"
  LORBIT: 11
  NELM: 100

static:standard:
  ENCUT: 520
  EDIFF: 1.0e-5
  ISMEAR: 0
  SIGMA: 0.05
  NSW: 0
